name: Fix fieldlog timed note race

on:
  push:
    branches:
      - codex/kiwi-integration
    paths:
      - .github/workflows/fieldlog-note-race-fix.yml

permissions:
  contents: write

jobs:
  patch-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: codex/kiwi-integration
          fetch-depth: 0

      - name: Patch worker and frontend
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          app_path = Path("fieldlog/public/app.js")
          app = app_path.read_text(encoding="utf-8")
          old_app = '''async function addTimedNote(session) {
            if (!session) return;
            const text = prompt("記一句（會標上目前的時間點）：");
            if (!text || !text.trim()) return;
            const offset = fmtSecs(segOffset(session));
            try {
              const entry = await api(`/entries/${session.entryId}`);
              const line = `[${offset}] ${text.trim()}`;
              const body = entry.body ? `${entry.body}\n${line}` : line;
              await api(`/entries/${session.entryId}`, { method: "PUT", body: JSON.stringify({ body }) });
              showToast("已記錄");
            } catch (err) { showToast("記錄失敗：" + err.message); }
          }'''
          new_app = '''async function addTimedNote(session) {
            if (!session) return;
            const text = prompt("記一句（會標上目前的時間點）：");
            if (!text || !text.trim()) return;
            const offset = fmtSecs(segOffset(session));
            const line = `[${offset}] ${text.trim()}`;
            try {
              await api(`/entries/${session.entryId}/notes`, {
                method: "POST",
                body: JSON.stringify({ line }),
              });
              showToast("已記錄");
            } catch (err) { showToast("記錄失敗：" + err.message); }
          }'''
          if old_app not in app:
            raise SystemExit("addTimedNote() 原始區塊不符，停止修改")
          app = app.replace(old_app, new_app, 1)
          app_path.write_text(app, encoding="utf-8")

          worker_path = Path("fieldlog/src/worker.js")
          worker = worker_path.read_text(encoding="utf-8")
          marker = '  const entryMatch = path.match(/^\\/entries\\/(\\d+)$/);\n'
          route = '''  // 錄影／錄音中的「記一句」必須以單一 SQL UPDATE 原子追加，
          // 避免兩個並發請求都讀到相同舊 body 後互相覆蓋。
          const noteMatch = path.match(/^\\/entries\\/(\\d+)\\/notes$/);
          if (noteMatch && method === "POST") {
            const id = Number(noteMatch[1]);
            const body = await request.json().catch(() => ({}));
            const line = String(body.line || "").trim();
            if (!line) return bad("line 為必填");

            // SELECT 僅用於存在性與歷程 folder_id；body 的讀取與追加都在下方
            // 同一個 UPDATE 陳述式完成，D1/SQLite 會序列化並發寫入。
            const old = await db.prepare("SELECT id, folder_id FROM entries WHERE id = ?").bind(id).first();
            if (!old) return bad("找不到紀錄", 404);

            const result = await db.prepare(
              "UPDATE entries SET body = CASE WHEN body IS NULL OR body = '' THEN ? ELSE body || char(10) || ? END, updated_at = ? WHERE id = ?"
            ).bind(line, line, now(), id).run();
            if (!result.meta.changes) return bad("找不到紀錄", 404);

            await logHistory(db, id, old.folder_id ?? null, "記一句", line);
            return json({ ok: true });
          }

          '''
          if 'const noteMatch = path.match(/^\\/entries\\/(\\d+)\\/notes$/);' not in worker:
            if marker not in worker:
              raise SystemExit("entries 路由插入點不存在，停止修改")
            worker = worker.replace(marker, route + marker, 1)
          worker_path.write_text(worker, encoding="utf-8")
          PY

      - name: Verify targeted source changes
        shell: bash
        run: |
          grep -F 'await api(`/entries/${session.entryId}/notes`' fieldlog/public/app.js
          grep -F 'const noteMatch = path.match(/^\/entries\/(\d+)\/notes$/);' fieldlog/src/worker.js
          if sed -n '/async function addTimedNote/,/^}/p' fieldlog/public/app.js | grep -F 'const entry = await api(`/entries/${session.entryId}`)'; then
            echo 'addTimedNote still contains read-modify-write GET' >&2
            exit 1
          fi
          node --check fieldlog/public/app.js
          node --check fieldlog/src/worker.js

      - name: Test concurrent atomic append
        shell: bash
        run: |
          python - <<'PY'
          import sqlite3
          import tempfile
          import threading
          from concurrent.futures import ThreadPoolExecutor
          from pathlib import Path

          db_path = Path(tempfile.mkdtemp()) / "race.db"
          setup = sqlite3.connect(db_path)
          setup.execute("PRAGMA journal_mode=WAL")
          setup.execute("CREATE TABLE entries (id INTEGER PRIMARY KEY, body TEXT DEFAULT '', updated_at TEXT)")
          setup.execute("INSERT INTO entries (id, body) VALUES (1, '舊內容')")
          setup.commit()
          setup.close()

          barrier = threading.Barrier(2)
          sql = "UPDATE entries SET body = CASE WHEN body IS NULL OR body = '' THEN ? ELSE body || char(10) || ? END, updated_at = ? WHERE id = ?"

          def append(line):
            conn = sqlite3.connect(db_path, timeout=10, isolation_level=None)
            conn.execute("PRAGMA busy_timeout=10000")
            barrier.wait()
            conn.execute(sql, (line, line, "2026-07-24 00:00:00Z", 1))
            conn.close()

          with ThreadPoolExecutor(max_workers=2) as pool:
            list(pool.map(append, ["[00:34] 記事A", "[00:35] 記事B"]))

          check = sqlite3.connect(db_path)
          body = check.execute("SELECT body FROM entries WHERE id = 1").fetchone()[0]
          check.close()
          lines = body.splitlines()
          assert lines[0] == "舊內容", body
          assert set(lines[1:]) == {"[00:34] 記事A", "[00:35] 記事B"}, body
          assert len(lines) == 3, body
          print(body)
          PY

      - name: Compile Worker with Wrangler
        shell: bash
        run: npx --yes wrangler@4 deploy --dry-run --config fieldlog/wrangler.jsonc --outdir /tmp/fieldlog-worker

      - name: Remove one-shot workflow and commit fix
        shell: bash
        run: |
          rm -f .github/workflows/fieldlog-note-race-fix.yml
          git config user.name "fieldlog-fix-bot"
          git config user.email "fieldlog-fix-bot@users.noreply.github.com"
          git add fieldlog/public/app.js fieldlog/src/worker.js .github/workflows/fieldlog-note-race-fix.yml
          git commit -m "Fix timed note append race condition"
          git push origin HEAD:codex/kiwi-integration
